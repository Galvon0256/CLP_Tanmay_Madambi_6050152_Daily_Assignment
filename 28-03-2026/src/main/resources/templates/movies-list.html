<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>All Movies</title>
</head>
<body>

<h1>All Movies</h1>

<p th:if="${message}" th:text="${message}"></p>

<p><a th:href="@{/movies/new}">Add New Movie</a> | <a th:href="@{/}">Back to Home</a></p>

<p th:if="${movies.empty}">No movies available.</p>

<table th:unless="${movies.empty}" border="1">
    <tr>
        <th>Title</th>
        <th>Genre</th>
        <th>Rating</th>
        <th>Actions</th>
    </tr>
    <tr th:each="movie : ${movies}">
        <td th:text="${movie.title}"></td>
        <td th:text="${movie.genre}"></td>
        <td th:text="${movie.rating}"></td>
        <td>
            <a th:href="@{/movies/{id}/edit(id=${movie.id})}">Edit</a>
            <form th:action="@{/movies/{id}/delete(id=${movie.id})}" method="post" style="display:inline; margin-left: 8px;">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
</table>

</body>
</html>
