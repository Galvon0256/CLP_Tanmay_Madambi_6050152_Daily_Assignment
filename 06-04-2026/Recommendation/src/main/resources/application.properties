spring.application.name=Recommendation
server.port=8085
spring.config.import=optional:configserver:http://localhost:8888

# Tracing Configuration
management.tracing.sampling.probability=1.0
management.tracing.export.zipkin.endpoint=http://localhost:9411/api/v2/spans

# Eureka Discovery Configuration
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.recommendationService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.recommendationService.slidingWindowSize=5
resilience4j.circuitbreaker.instances.recommendationService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.recommendationService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.recommendationService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.recommendationService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.recommendationService.slidingWindowType=COUNT_BASED
